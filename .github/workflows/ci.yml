name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: secureboard_test
          POSTGRES_USER: secureboard
          POSTGRES_PASSWORD: secureboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secureboard -d secureboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_TEST_URL: postgresql://secureboard:secureboard@127.0.0.1:5432/secureboard_test?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      JWT_ACCESS_SECRET: test-access-secret-with-at-least-32-chars
      JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-32-chars
      ACCESS_TOKEN_TTL_MINUTES: 15
      REFRESH_TOKEN_TTL_DAYS: 7
      BCRYPT_ROUNDS: 12
      COOKIE_SECURE: false
      CORS_ORIGIN: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run backend tests
        run: npm test